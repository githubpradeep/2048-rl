env: flappy_tabular
common:
  seed: 42
train:
  episodes: 10000
  eval-every: 200
  eval-episodes: 100
  env-preset: standard
  reverse-sweep: true
  save-dir: models/flappy_tabular
eval:
  model: models/flappy_tabular/flappy_tabular_best.json
  episodes: 200
  env-preset: standard

play:
  model: models/flappy_tabular/flappy_tabular_best.json
  mode: pygame
  delay: 0.06
